services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-paygateway}
      POSTGRES_USER: ${DB_USERNAME:-pay_app_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      # Creates msx_virtual_account on first init (POSTGRES_DB only makes one DB)
      - source: va_init_db
        target: /docker-entrypoint-initdb.d/01-create-virtual-account-db.sql
      # Creates msx_rail on first init
      - source: rail_init_db
        target: /docker-entrypoint-initdb.d/02-create-rail-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pay_app_user} -d ${DB_NAME:-paygateway}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Postgres Exporter (H6 read-model observability) ─────────────────────────
  postgres-exporter:
    profiles: ["infra"]
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USERNAME:-pay_app_user}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-paygateway}?sslmode=disable
    volumes:
      - ./monitor/postgres-exporter:/etc/postgres-exporter:ro
    command:
      - --config.file=/etc/postgres-exporter/postgres_exporter.yml
    ports:
      - "9187:9187"

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    profiles: ["infra", "virtual-account", "rail"]
    build:
      context: ./monitor/kafka
      dockerfile: Dockerfile
      args:
        KAFKA_IMAGE: apache/kafka:4.1.2
        JMX_EXPORTER_VERSION: 1.0.1
    image: masonxpay-kafka:local
    hostname: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:9092,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OPTS: -javaagent:/opt/kafka/libs/jmx_prometheus_javaagent.jar=7071:/opt/kafka/config/kafka-jmx.yml
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9094:9094"
      - "7071:7071"
    healthcheck:
      test: ["CMD-SHELL", "env -u KAFKA_OPTS /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    profiles: ["infra"]
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Spring Boot) ───────────────────────────────────────────────────
  gateway-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
        required: false   # skipped when Kafka is not in the active profile
    ports:
      - "8080:8080"
    environment:
      # Database — points to the postgres service above
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-paygateway}
      DB_USERNAME: ${DB_USERNAME:-pay_app_user}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-pay_app_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password123}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32-chars-min}
      # CORS — allow the dashboard origin
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # App URLs
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      PAY_BASE_URL: ${PAY_BASE_URL:-http://localhost:3000}
      # High-throughput profile sharding
      PAYMENT_SHARD_COUNT: ${PAYMENT_SHARD_COUNT:-64}
      # Kafka outbox publisher
      KAFKA_OUTBOX_ENABLED: ${KAFKA_OUTBOX_ENABLED:-false}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_OUTBOX_TOPIC: ${KAFKA_OUTBOX_TOPIC:-payment.lifecycle.events}
      KAFKA_OUTBOX_TOPIC_PARTITIONS: ${KAFKA_OUTBOX_TOPIC_PARTITIONS:-12}
      KAFKA_WEBHOOK_CONSUMER_ENABLED: ${KAFKA_WEBHOOK_CONSUMER_ENABLED:-false}
      KAFKA_WEBHOOK_CONSUMER_GROUP_ID: ${KAFKA_WEBHOOK_CONSUMER_GROUP_ID:-masonxpay-webhook-worker}
      KAFKA_PAYMENT_PROJECTION_ENABLED: ${KAFKA_PAYMENT_PROJECTION_ENABLED:-false}
      KAFKA_PAYMENT_PROJECTION_GROUP_ID: ${KAFKA_PAYMENT_PROJECTION_GROUP_ID:-masonxpay-payment-projection}
      PAYMENT_PROJECTION_BACKFILL_ENABLED: ${PAYMENT_PROJECTION_BACKFILL_ENABLED:-false}
      WEBHOOK_OUTBOX_POLLER_ENABLED: ${WEBHOOK_OUTBOX_POLLER_ENABLED:-true}
      # Redis hot path
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_HOT_PATH_ENABLED: ${REDIS_HOT_PATH_ENABLED:-false}
      REDIS_HOT_PATH_FAIL_OPEN: ${REDIS_HOT_PATH_FAIL_OPEN:-true}
      REDIS_RATE_LIMIT_ENABLED: ${REDIS_RATE_LIMIT_ENABLED:-false}
      REDIS_RATE_LIMIT_CREATE_PAYMENT_INTENT_PER_WINDOW: ${REDIS_RATE_LIMIT_CREATE_PAYMENT_INTENT_PER_WINDOW:-600}
      REDIS_RATE_LIMIT_CONFIRM_PAYMENT_INTENT_PER_WINDOW: ${REDIS_RATE_LIMIT_CONFIRM_PAYMENT_INTENT_PER_WINDOW:-300}
      REDIS_IDEMPOTENCY_CACHE_ENABLED: ${REDIS_IDEMPOTENCY_CACHE_ENABLED:-false}
      REDIS_PROVIDER_HEALTH_CACHE_ENABLED: ${REDIS_PROVIDER_HEALTH_CACHE_ENABLED:-false}
      REDIS_HEALTH_ENABLED: ${REDIS_HEALTH_ENABLED:-false}
      # H7 benchmark simulator provider (TEST-only)
      PROVIDER_SIMULATOR_ENABLED: ${PROVIDER_SIMULATOR_ENABLED:-false}
      PROVIDER_SIMULATOR_BASE_LATENCY_MS: ${PROVIDER_SIMULATOR_BASE_LATENCY_MS:-25}
      PROVIDER_SIMULATOR_JITTER_MS: ${PROVIDER_SIMULATOR_JITTER_MS:-25}
      PROVIDER_SIMULATOR_FAILURE_RATE: ${PROVIDER_SIMULATOR_FAILURE_RATE:-0.0}
      PROVIDER_SIMULATOR_TIMEOUT_RATE: ${PROVIDER_SIMULATOR_TIMEOUT_RATE:-0.0}
      # MR5-B: gateway → rail bridge (active when --profile rail is used)
      RAIL_ENABLED: ${RAIL_ENABLED:-false}
      RAIL_BASE_URL: ${RAIL_BASE_URL:-http://rail-service:8081}
      RAIL_RESOLVED_TOPIC: ${RAIL_RESOLVED_TOPIC:-rail.payment.resolved}
      RAIL_RESOLVED_CONSUMER_GROUP_ID: ${RAIL_RESOLVED_CONSUMER_GROUP_ID:-gateway-rail-resolved}
      # RAG support assistant (docs-only)
      AI_ASSISTANT_ENABLED: ${AI_ASSISTANT_ENABLED:-false}
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL:-http://ai-service:8090}
      # Stripe (optional for local dev — leave blank to skip)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Email (optional — leave blank to disable email sending)
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # Encryption key (AES-256, 32 bytes base64)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ── AI service (docs-only RAG assistant; profile: ai) ───────────────────────
  # Enable with: AI_ASSISTANT_ENABLED=true docker compose --profile ai up --build
  ai-service:
    profiles: ["ai"]
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      RAG_VECTOR_BACKEND: ${RAG_VECTOR_BACKEND:-qdrant}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-masonxpay_docs}
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 12

  qdrant:
    profiles: ["ai"]
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    profiles: ["infra"]
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    depends_on:
      gateway-service:
        condition: service_healthy
    volumes:
      - ./monitor/prometheus:/etc/prometheus:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    profiles: ["infra"]
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/payments.json
    volumes:
      - ./monitor/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitor/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"   # 3000 is taken by the Next.js dashboard
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1g


  # ── Dashboard (Next.js) ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        # Baked in at build time — must match the host-accessible backend URL
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_ENABLE_SIMULATOR_PROVIDER: ${NEXT_PUBLIC_ENABLE_SIMULATOR_PROVIDER:-false}
    restart: unless-stopped
    depends_on:
      gateway-service:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ── Rail service (ISO 8583 / ISO 20022; profile: rail) ─────────────────────
  # Enable with: docker compose --profile rail up --build
  # Brings up Kafka + rail-service + rail-simulator. rail-simulator exposes:
  #   HTTP admin: host 9099 → container 9090
  #   TCP ISO 8583: host 9091 → container 9091
  rail-service:
    profiles: ["rail", "infra"]
    build:
      context: ./backend
      dockerfile: Dockerfile.rail
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      RAIL_DB_NAME: ${RAIL_DB_NAME:-msx_rail}
      RAIL_DB_USERNAME: ${DB_USERNAME:-pay_app_user}
      RAIL_DB_PASSWORD: ${DB_PASSWORD:-password123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RAIL_SIMULATOR_HOST: rail-simulator
      RAIL_SIMULATOR_HTTP_PORT: 9090
      RAIL_SIMULATOR_TCP_PORT: 9091
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  rail-simulator:
    profiles: ["rail", "infra"]
    build:
      context: ./backend
      dockerfile: Dockerfile.railsim
    restart: unless-stopped
    ports:
      - "9099:9090"   # HTTP admin — 9090 reserved for Prometheus in infra profile
      - "9091:9091"   # TCP ISO 8583 channel
    environment:
      VA_ISSUER_URL: http://virtual-account:8086/internal/issuer/authorize

  # ── Virtual Account service (optional; profile: virtual-account) ────────────
  # Enable with:  docker compose --profile virtual-account up --build
  # Brings up Kafka (shared profile) + this service; uses the msx_virtual_account
  # database created by scripts/init-db. Default stack stays backend+dashboard+pg.
  virtual-account:
    profiles: ["virtual-account", "infra"]
    build:
      context: ./backend
      dockerfile: Dockerfile.va
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      VA_DB_NAME: ${VA_DB_NAME:-msx_virtual_account}
      VA_DB_USERNAME: ${DB_USERNAME:-pay_app_user}
      VA_DB_PASSWORD: ${DB_PASSWORD:-password123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      VA_KAFKA_CONSUMER_ENABLED: ${VA_KAFKA_CONSUMER_ENABLED:-true}
      VA_SETTLEMENT_TOPIC: ${VA_SETTLEMENT_TOPIC:-payment.settlement.events}

volumes:
  postgres_data:
  kafka_data:
  grafana_data:
  qdrant_data:

configs:
  # Inline Postgres init: creates the Virtual Account database. Runs only on a
  # fresh data volume. Used by the virtual-account profile; harmless otherwise.
  va_init_db:
    content: |
      CREATE DATABASE msx_virtual_account;
  # Inline Postgres init: creates the Rail database. Runs only on a fresh volume.
  rail_init_db:
    content: |
      CREATE DATABASE msx_rail;
