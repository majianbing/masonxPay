services:
  postgres:
    environment:
      POSTGRES_DB: ${PREVIEW_DB_NAME:-paygateway_preview}
      POSTGRES_USER: ${PREVIEW_DB_USERNAME:-pay_preview_user}
      POSTGRES_PASSWORD: ${PREVIEW_DB_PASSWORD:-preview_password_123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PREVIEW_DB_USERNAME:-pay_preview_user} -d ${PREVIEW_DB_NAME:-paygateway_preview}"]

  postgres-exporter:
    environment:
      DATA_SOURCE_NAME: postgresql://${PREVIEW_DB_USERNAME:-pay_preview_user}:${PREVIEW_DB_PASSWORD:-preview_password_123}@postgres:5432/${PREVIEW_DB_NAME:-paygateway_preview}?sslmode=disable

  kafka:
    environment:
      KAFKA_HEAP_OPTS: -Xms512m -Xmx1g
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 134217728
      KAFKA_NUM_PARTITIONS: ${KAFKA_OUTBOX_TOPIC_PARTITIONS:-12}

  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_preview_data:/data

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-preview}
      DB_NAME: ${PREVIEW_DB_NAME:-paygateway_preview}
      DB_USERNAME: ${PREVIEW_DB_USERNAME:-pay_preview_user}
      DB_PASSWORD: ${PREVIEW_DB_PASSWORD:-preview_password_123}
      SPRING_DATASOURCE_USERNAME: ${PREVIEW_DB_USERNAME:-pay_preview_user}
      SPRING_DATASOURCE_PASSWORD: ${PREVIEW_DB_PASSWORD:-preview_password_123}
      JWT_SECRET: ${PREVIEW_JWT_SECRET:-preview-local-jwt-secret-change-before-real-prod-256-bit}
      ENCRYPTION_KEY: ${PREVIEW_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

  prometheus:
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=4GB
      - --web.enable-lifecycle
volumes:
  redis_preview_data:
