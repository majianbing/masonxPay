apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: masonxpay
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Replace with a real ACM certificate ARN before applying.
    alb.ingress.kubernetes.io/certificate-arn: <ACM_CERTIFICATE_ARN>
    # NOT /actuator/health — its aggregate status is DOWN whenever a tenant has
    # zero active payment connectors (normal on a fresh deploy, not an infra
    # problem), which would flap ALB target health. /actuator/health/liveness
    # only reflects infra state, but SecurityConfig.java currently permits the
    # exact path "/actuator/health" only — see README.md "ALB health check" note.
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/liveness
spec:
  rules:
    - host: <YOUR_DOMAIN>
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3000
