apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: masonxpay
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  rules:
    - host: masonxpay.local
      http:
        paths:
          # gateway-service routes already carry /api/v1/... — no rewrite needed.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8080
          # Public unauthenticated checkout/webhook-test endpoints — PublicCheckoutController,
          # PublicPaymentController (/pub/pay), PublicSubscriptionCheckoutController
          # (/pub/subscription-checkout). Used by the browser SDK / hosted checkout widget and
          # the dashboard's connector preview flow. Without this rule these fall through to the
          # "/" catch-all below and 404 against the dashboard instead of reaching gateway-service.
          - path: /pub
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3000
