apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base = the default `docker compose up --build` stack: postgres + gateway-service
# + dashboard, no Kafka/Redis/virtual-account/rail. Overlays add a namespace and
# secrets; components/ adds the optional profiles.

resources:
  - namespace.yaml
  - postgres/service.yaml
  - postgres/statefulset.yaml
  - postgres/init-configmap.yaml
  - gateway-service/configmap.yaml
  - gateway-service/deployment.yaml
  - gateway-service/service.yaml
  - dashboard/deployment.yaml
  - dashboard/service.yaml
