apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Requires the kafka component (rail-service publishes settlement events) and
# the virtual-account component (rail-simulator calls its issuer endpoint for
# the VCC/BIN 999999 flow).

resources:
  - rail-service-deployment.yaml
  - rail-service-service.yaml
  - rail-simulator-deployment.yaml
  - rail-simulator-service.yaml

patches:
  - path: patch-gateway-config.yaml
    target:
      kind: ConfigMap
      name: masonxpay-config
