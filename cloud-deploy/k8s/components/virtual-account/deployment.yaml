apiVersion: apps/v1
kind: Deployment
metadata:
  name: virtual-account
spec:
  replicas: 1
  selector:
    matchLabels:
      app: virtual-account
  template:
    metadata:
      labels:
        app: virtual-account
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 9092; do sleep 2; done"]
      containers:
        - name: virtual-account
          image: masonxpay/virtual-account:local
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: masonxpay-config
          env:
            - name: VA_DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: masonxpay-config
                  key: DB_USERNAME
            - name: VA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masonxpay-secrets
                  key: DB_PASSWORD
            - name: VA_KAFKA_CONSUMER_ENABLED
              value: "true"
            - name: VA_SETTLEMENT_TOPIC
              value: payment.settlement.events
          # TCP, not /actuator/health — see base/gateway-service/deployment.yaml
          # for why the aggregate health endpoint isn't safe to probe here.
          readinessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 750m
              memory: 1Gi
