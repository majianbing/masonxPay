logging:
  level:
    root: INFO
    com.masonx.paygateway: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    com.alibaba.csp.sentinel: WARN

spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:paygateway}
    username: ${DB_USERNAME:pay_app_user}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT_MS:200ms}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  health:
    mail:
      enabled: false
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:true}
  metrics:
    tags:
      application: masonxpay
      environment: preview

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long-secret-key}
    access-token-expiry-ms: 3600000
    refresh-token-expiry-ms: 604800000
  invite:
    token-expiry-ms: 172800000
    base-url: ${APP_BASE_URL:http://localhost:8080}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  square:
    webhook-signature-key: ${SQUARE_WEBHOOK_SIGNATURE_KEY:}
    webhook-notification-url: ${SQUARE_WEBHOOK_NOTIFICATION_URL:}
  encryption:
    key: ${ENCRYPTION_KEY:}
  logs:
    retention-periods: ${LOG_RETENTION_PERIODS:2}
  pay-base-url: ${PAY_BASE_URL:http://localhost:3000}
  webhook:
    outbox-poller:
      enabled: ${WEBHOOK_OUTBOX_POLLER_ENABLED:false}

  sharding:
    payment:
      shard-count: ${PAYMENT_SHARD_COUNT:64}

  kafka:
    outbox:
      enabled: ${KAFKA_OUTBOX_ENABLED:true}
      topic: ${KAFKA_OUTBOX_TOPIC:payment.lifecycle.events}
      batch-size: ${KAFKA_OUTBOX_BATCH_SIZE:200}
      poll-delay-ms: ${KAFKA_OUTBOX_POLL_DELAY_MS:500}
      send-timeout-ms: ${KAFKA_OUTBOX_SEND_TIMEOUT_MS:3000}
      retention-days: ${KAFKA_OUTBOX_RETENTION_DAYS:7}
      cleanup-batch-size: ${KAFKA_OUTBOX_CLEANUP_BATCH_SIZE:2000}
      topic-partitions: ${KAFKA_OUTBOX_TOPIC_PARTITIONS:12}
    webhook-consumer:
      enabled: ${KAFKA_WEBHOOK_CONSUMER_ENABLED:true}
      group-id: ${KAFKA_WEBHOOK_CONSUMER_GROUP_ID:masonxpay-webhook-worker-preview}
    payment-projection:
      enabled: ${KAFKA_PAYMENT_PROJECTION_ENABLED:true}
      group-id: ${KAFKA_PAYMENT_PROJECTION_GROUP_ID:masonxpay-payment-projection-preview}

  projection:
    backfill:
      enabled: ${PAYMENT_PROJECTION_BACKFILL_ENABLED:false}

  redis:
    enabled: ${REDIS_HOT_PATH_ENABLED:true}
    fail-open: ${REDIS_HOT_PATH_FAIL_OPEN:true}
    idempotency:
      enabled: ${REDIS_IDEMPOTENCY_CACHE_ENABLED:true}
      ttl-seconds: ${REDIS_IDEMPOTENCY_CACHE_TTL_SECONDS:86400}
    rate-limit:
      enabled: ${REDIS_RATE_LIMIT_ENABLED:true}
      window-seconds: ${REDIS_RATE_LIMIT_WINDOW_SECONDS:60}
      create-payment-intent-per-window: ${REDIS_RATE_LIMIT_CREATE_PAYMENT_INTENT_PER_WINDOW:600}
      confirm-payment-intent-per-window: ${REDIS_RATE_LIMIT_CONFIRM_PAYMENT_INTENT_PER_WINDOW:300}
    provider-health:
      enabled: ${REDIS_PROVIDER_HEALTH_CACHE_ENABLED:true}
      ttl-seconds: ${REDIS_PROVIDER_HEALTH_CACHE_TTL_SECONDS:600}

  sentinel:
    flow-rules:
      - resource: "POST:/api/v1/payment-intents"
        grade: QPS
        count: 200
        control-behavior: RATE_LIMITER
        max-queueing-time-ms: 3000
        limit-app: default
      - resource: "POST:/api/v1/payment-intents/{id}/confirm"
        grade: QPS
        count: 100
        control-behavior: RATE_LIMITER
        max-queueing-time-ms: 5000
        limit-app: default
    degrade-rules:
      - resource: stripe-charge
        grade: SLOW_REQUEST_RATIO
        count: 3000
        slow-ratio-threshold: 0.5
        min-request-amount: 5
        stat-interval-ms: 10000
        time-window: 30
      - resource: square-charge
        grade: SLOW_REQUEST_RATIO
        count: 3000
        slow-ratio-threshold: 0.5
        min-request-amount: 5
        stat-interval-ms: 10000
        time-window: 30
      - resource: braintree-charge
        grade: SLOW_REQUEST_RATIO
        count: 3000
        slow-ratio-threshold: 0.5
        min-request-amount: 5
        stat-interval-ms: 10000
        time-window: 30
    system:
      highest-system-load: 6.0
      highest-cpu-usage: 0.9
      avg-rt: -1
      max-thread: -1
