logging:
  level:
    root: INFO
    com.masonx.paygateway: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    com.alibaba.csp.sentinel: WARN

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paygateway}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT_MS:200ms}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always   # port 8080 is internal-only; details are safe to expose
    prometheus:
      enabled: true
  health:
    mail:
      enabled: false
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}
  metrics:
    tags:
      application: masonxpay
    distribution:
      percentiles-histogram:
        payment.charge.latency: true
        http.server.requests: true
      slo:
        payment.charge.latency: 25ms,50ms,100ms,250ms,500ms,1s,2s,5s

gateway:
  id:
    node-id: ${GATEWAY_NODE_ID:2}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long-secret-key}
    access-token-expiry-ms: 86400000      # 24h
    refresh-token-expiry-ms: 604800000    # 7d
  invite:
    token-expiry-ms: 172800000            # 48h
    base-url: ${APP_BASE_URL:http://localhost:8080}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  square:
    webhook-signature-key: ${SQUARE_WEBHOOK_SIGNATURE_KEY:}
    webhook-notification-url: ${SQUARE_WEBHOOK_NOTIFICATION_URL:}
  encryption:
    key: ${ENCRYPTION_KEY:}       # base64-encoded 32-byte key — generate: openssl rand -base64 32
  logs:
    retention-periods: ${LOG_RETENTION_PERIODS:4}   # number of 6-month periods to keep (default 4 = 2 years)
  gateway-logs:
    enabled: ${GATEWAY_LOGS_ENABLED:false}
    mode: ${GATEWAY_LOGS_MODE:DISABLED}  # INLINE | KAFKA | DISABLED
    sample-rate: ${GATEWAY_LOG_SAMPLE_RATE:1.0}
    topic: ${GATEWAY_LOG_KAFKA_TOPIC:gateway.api.logs}
    group-id: ${GATEWAY_LOG_KAFKA_GROUP_ID:masonxpay-gateway-log-writer}
    batch-size: ${GATEWAY_LOG_KAFKA_BATCH_SIZE:250}
    topic-partitions: ${GATEWAY_LOG_KAFKA_TOPIC_PARTITIONS:12}
    consumer-concurrency: ${GATEWAY_LOG_KAFKA_CONSUMER_CONCURRENCY:1}
    consumer-store-enabled: ${GATEWAY_LOG_KAFKA_CONSUMER_STORE_ENABLED:true}
  pay-base-url: ${PAY_BASE_URL:http://localhost:3000}  # base URL for shareable payment link URLs
  webhook:
    outbox-poller:
      enabled: ${WEBHOOK_OUTBOX_POLLER_ENABLED:true}

  sharding:
    payment:
      shard-count: ${PAYMENT_SHARD_COUNT:64}

  kafka:
    outbox:
      enabled: ${KAFKA_OUTBOX_ENABLED:false}
      topic: ${KAFKA_OUTBOX_TOPIC:payment.lifecycle.events}
      batch-size: ${KAFKA_OUTBOX_BATCH_SIZE:100}
      poll-delay-ms: ${KAFKA_OUTBOX_POLL_DELAY_MS:1000}
      send-timeout-ms: ${KAFKA_OUTBOX_SEND_TIMEOUT_MS:5000}
      retention-days: ${KAFKA_OUTBOX_RETENTION_DAYS:14}
      cleanup-batch-size: ${KAFKA_OUTBOX_CLEANUP_BATCH_SIZE:1000}
      topic-partitions: ${KAFKA_OUTBOX_TOPIC_PARTITIONS:12}
    webhook-consumer:
      enabled: ${KAFKA_WEBHOOK_CONSUMER_ENABLED:false}
      group-id: ${KAFKA_WEBHOOK_CONSUMER_GROUP_ID:masonxpay-webhook-worker}
    payment-projection:
      enabled: ${KAFKA_PAYMENT_PROJECTION_ENABLED:false}
      group-id: ${KAFKA_PAYMENT_PROJECTION_GROUP_ID:masonxpay-payment-projection}
  projection:
    backfill:
      enabled: ${PAYMENT_PROJECTION_BACKFILL_ENABLED:false}
  redis:
    enabled: ${REDIS_HOT_PATH_ENABLED:false}
    fail-open: ${REDIS_HOT_PATH_FAIL_OPEN:true}
    idempotency:
      enabled: ${REDIS_IDEMPOTENCY_CACHE_ENABLED:true}
      ttl-seconds: ${REDIS_IDEMPOTENCY_CACHE_TTL_SECONDS:86400}
    rate-limit:
      enabled: ${REDIS_RATE_LIMIT_ENABLED:true}
      window-seconds: ${REDIS_RATE_LIMIT_WINDOW_SECONDS:60}
      create-payment-intent-per-window: ${REDIS_RATE_LIMIT_CREATE_PAYMENT_INTENT_PER_WINDOW:600}
      confirm-payment-intent-per-window: ${REDIS_RATE_LIMIT_CONFIRM_PAYMENT_INTENT_PER_WINDOW:300}
    provider-health:
      enabled: ${REDIS_PROVIDER_HEALTH_CACHE_ENABLED:true}
      ttl-seconds: ${REDIS_PROVIDER_HEALTH_CACHE_TTL_SECONDS:600}

  storage:
    type: ${STORAGE_TYPE:local}           # local | s3
    local:
      base-dir: ${STORAGE_LOCAL_BASE_DIR:./uploads}
    s3:
      bucket: ${STORAGE_S3_BUCKET:}
      region: ${STORAGE_S3_REGION:us-east-1}
      prefix: ${STORAGE_S3_PREFIX:}       # optional key prefix, e.g. "masonxpay/"
      presigned-url-expiry-seconds: ${STORAGE_S3_PRESIGNED_TTL:3600}

  rail:
    enabled: ${RAIL_ENABLED:false}
    base-url: ${RAIL_BASE_URL:http://localhost:8081}
    resolved-topic: ${RAIL_RESOLVED_TOPIC:rail.payment.resolved}
    kafka:
      consumer:
        group-id: ${RAIL_RESOLVED_CONSUMER_GROUP_ID:gateway-rail-resolved}

  provider-simulator:
    enabled: ${PROVIDER_SIMULATOR_ENABLED:false}
    base-latency-ms: ${PROVIDER_SIMULATOR_BASE_LATENCY_MS:25}
    jitter-ms: ${PROVIDER_SIMULATOR_JITTER_MS:25}
    failure-rate: ${PROVIDER_SIMULATOR_FAILURE_RATE:0.0}
    timeout-rate: ${PROVIDER_SIMULATOR_TIMEOUT_RATE:0.0}
    timeout-latency-ms: ${PROVIDER_SIMULATOR_TIMEOUT_LATENCY_MS:2000}

  ai:
    assistant:
      enabled: ${AI_ASSISTANT_ENABLED:false}
      base-url: ${AI_SERVICE_BASE_URL:http://localhost:8090}
      connect-timeout-ms: ${AI_SERVICE_CONNECT_TIMEOUT_MS:1000}
      read-timeout-ms: ${AI_SERVICE_READ_TIMEOUT_MS:5000}
      auth-token: ${AI_SERVICE_AUTH_TOKEN:}
      request-limit-per-window: ${AI_ASSISTANT_REQUEST_LIMIT_PER_WINDOW:60}
      token-limit-per-window: ${AI_ASSISTANT_TOKEN_LIMIT_PER_WINDOW:12000}
      budget-window-seconds: ${AI_ASSISTANT_BUDGET_WINDOW_SECONDS:3600}

  # ── Sentinel rate limiting + circuit breaking ──────────────────────────────
  # Rules are loaded at startup from these properties.
  # To migrate to Nacos: add sentinel-datasource-nacos, push these values as
  # JSON to a Nacos config key, replace loadRules() with NacosDataSource binding.
  # Resource names match the "HTTP_METHOD:/path" pattern from the WebMVC adapter.
  sentinel:
    flow-rules:
      # Payment intent creation — leaky bucket, queue bursts at steady rate
      # 60 req/min per merchant = 1/s; requests wait up to 5s before rejection
      - resource: "POST:/api/v1/payment-intents"
        grade: QPS
        count: 1000
        control-behavior: RATE_LIMITER
        max-queueing-time-ms: 5000
        limit-app: default

      # Confirm (actual charge) — tighter limit, longer queue tolerance
      - resource: "POST:/api/v1/payment-intents/{id}/confirm"
        grade: QPS
        count: 1000
        control-behavior: RATE_LIMITER
        max-queueing-time-ms: 8000
        limit-app: default

    degrade-rules:
      # Circuit break each provider independently.
      # Opens when >50% of calls exceed 3s within a 10s window (min 5 requests).
      # Stays open 30s, then half-open for a single probe before fully recovering.
      - resource: stripe-charge
        grade: SLOW_REQUEST_RATIO
        count: 3000            # slow threshold: 3000ms
        slow-ratio-threshold: 0.5
        min-request-amount: 5
        stat-interval-ms: 10000
        time-window: 30

      - resource: square-charge
        grade: SLOW_REQUEST_RATIO
        count: 3000
        slow-ratio-threshold: 0.5
        min-request-amount: 5
        stat-interval-ms: 10000
        time-window: 30

      - resource: braintree-charge
        grade: SLOW_REQUEST_RATIO
        count: 3000
        slow-ratio-threshold: 0.5
        min-request-amount: 5
        stat-interval-ms: 10000
        time-window: 30

    system:
      # Reject all incoming requests if JVM/OS is overloaded.
      # -1 disables the individual check.
      highest-system-load: 3.0   # 1-min load average
      highest-cpu-usage: 0.85    # 85% CPU
      avg-rt: -1
      max-thread: -1
