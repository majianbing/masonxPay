server:
  port: ${VA_SERVER_PORT:8086}

spring:
  application:
    name: virtual-account-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${VA_DB_NAME:msx_virtual_account}
    username: ${VA_DB_USERNAME:${DB_USERNAME:pay_app_user}}
    password: ${VA_DB_PASSWORD:${DB_PASSWORD:password123}}
  flyway:
    enabled: true
    locations: classpath:db/migration/va
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${VA_KAFKA_GROUP:masonxpay-virtual-account}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.masonx.*"
        spring.json.value.default.type: "com.masonx.contracts.settlement.SettlementEvent"

# Virtual Account service settings
va:
  internal:
    # Shared secret for /internal/** service-to-service calls.
    # Must match INTERNAL_AUTH_TOKEN in rail-simulator config.
    auth-token: ${INTERNAL_AUTH_TOKEN:internal-dev-secret}
  signature:
    # HMAC-SHA256 secret for the tamper-evident balance chain.
    # MUST be set via VA_SIGNATURE_SECRET in production — never commit a real value.
    secret: ${VA_SIGNATURE_SECRET:change-me-in-production}
  id:
    # Node ID (0–1023). Must be unique across all running VA service instances.
    # Set VA_NODE_ID per pod/instance in deployment config.
    node-id: ${VA_NODE_ID:0}
  kafka:
    settlement-topic: ${VA_SETTLEMENT_TOPIC:payment.settlement.events}
    rail-settlement-topic: ${VA_RAIL_SETTLEMENT_TOPIC:rail.settlement.events}
    consumer:
      # VA is optional; when Kafka is absent the listener can be turned off.
      enabled: ${VA_KAFKA_CONSUMER_ENABLED:true}
  # Bench endpoints — disabled by default; set VA_BENCH_ENABLED=true in bench docker-compose only.
  bench:
    enabled: ${VA_BENCH_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
