# ─────────────────────────────────────────────────────────────────────────────
# Capacity-proof ALB — fronts the two backend nodes.
# Kept thin so it's never the bottleneck (access logging off).
#
# IMPORTANT (Docker): backend containers get a NEW IP when recreated/restarted.
# A static upstream without `resolve` pins those IPs at nginx startup; after a
# backend recreate nginx can keep sending traffic to a dead IP and dump all live
# traffic onto the survivor. Use Docker DNS + upstream `resolve` so backend and
# backend-2 are re-resolved while preserving real least-connection balancing.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 8192;
}

http {
    access_log off;
    error_log  /var/log/nginx/error.log warn;

    sendfile      on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # Docker embedded DNS; re-resolve quickly so recreated backends are picked up.
    resolver 127.0.0.11 valid=2s ipv6=off;

    upstream backend_nodes {
        zone backend_nodes 64k;
        least_conn;
        server backend:8080 resolve max_fails=1 fail_timeout=2s;
        server backend-2:8080 resolve max_fails=1 fail_timeout=2s;
        keepalive 128;
    }

    server {
        listen 80;

        location = /alb-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://backend_nodes;

            # Reuse upstream connections without pinning all traffic to one node.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Retry the other node on a connection-level failure only (never replay a 5xx).
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;
        }
    }
}
