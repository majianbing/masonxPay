# ─────────────────────────────────────────────────────────────────────────────
# Capacity-proof ALB — fronts the two backend nodes (backend, backend-2).
# Kept deliberately thin so it is never the bottleneck and never contaminates
# the measurement (access logging off, upstream keepalive on).
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 8192;
}

http {
    # No access log — disk I/O here would pollute a resource-measured run.
    access_log off;
    error_log  /var/log/nginx/error.log warn;

    sendfile      on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # Two backend nodes, balanced by least-connections so the slow tail of one
    # node doesn't starve the other. Static service names → resolved once at start.
    upstream backend_nodes {
        least_conn;
        server backend:8080   max_fails=3 fail_timeout=5s;
        server backend-2:8080 max_fails=3 fail_timeout=5s;
        keepalive 128;
    }

    server {
        listen 80;

        # Lightweight health endpoint for the ALB itself.
        location = /alb-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://backend_nodes;

            # Reuse upstream connections (requires HTTP/1.1 + cleared Connection).
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Retry the other node on connection-level failure only (not on a 5xx,
            # which for payments must surface rather than be silently replayed).
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;
        }
    }
}
