# Compose override: resource-constrained stack + k6 benchmark runner
#
# ── Quick start ──────────────────────────────────────────────────────────────
#
#   # 1. Start the constrained Postgres-only stack (replaces docker compose up)
#   docker compose -f docker-compose.yml -f docker-compose.bench.yml up -d --build
#
#   # 2. Run the benchmark (k6 exits when done; results printed to stdout)
#   docker compose -f docker-compose.yml -f docker-compose.bench.yml --profile bench run --rm k6
#
#   # Optional: run the same benchmark against Kafka/Redis preview-style infra
#   docker compose -f docker-compose.yml -f docker-compose.bench.yml --profile infra up -d --build
#   RUN_MODE=infra docker compose -f docker-compose.yml -f docker-compose.bench.yml --profile bench --profile infra run --rm k6
#
# ── Instance-size profiles ───────────────────────────────────────────────────
#
#   t3.small  (default)  2 vCPU / 2 GB
#     BENCH_BACKEND_CPU=1.0  BENCH_BACKEND_MEM=1g
#     BENCH_DB_CPU=0.5       BENCH_DB_MEM=512m
#     BENCH_DASH_CPU=0.25    BENCH_DASH_MEM=256m
#
#   t3.medium            2 vCPU / 4 GB
#     BENCH_BACKEND_CPU=1.25 BENCH_BACKEND_MEM=2g
#     BENCH_DB_CPU=0.5       BENCH_DB_MEM=1g
#     BENCH_DASH_CPU=0.25    BENCH_DASH_MEM=512m
#
#   t3.large             2 vCPU / 8 GB
#     BENCH_BACKEND_CPU=1.75 BENCH_BACKEND_MEM=3g
#     BENCH_DB_CPU=0.75      BENCH_DB_MEM=2g
#     BENCH_DASH_CPU=0.25    BENCH_DASH_MEM=512m
#
#   Pass them as env vars on the same line:
#     BENCH_BACKEND_CPU=1.25 BENCH_BACKEND_MEM=2g BENCH_DB_MEM=1g \
#       docker compose -f docker-compose.yml -f docker-compose.bench.yml up -d --build
#
# ── Benchmark scenarios (k6) ─────────────────────────────────────────────────
#   smoke        — 1 VU × 1 min            verify the stack is healthy
#   average_load — ramp 0→20 VUs over 8 m  ~100 k tx/day sustained
#   spike        — ramp 0→100 VUs over 4 m stress-test ceiling
#
# ── Customising the run ───────────────────────────────────────────────────────
#   Override BASE_URL to point at a remote backend:
#     BASE_URL=https://api.example.com docker compose ... run --rm k6
#
#   Save results as JSON:
#     K6_WEB_DASHBOARD=true K6_WEB_DASHBOARD_EXPORT=bench/results/report.html \
#       docker compose ... run --rm k6

services:

  # ── Apply resource limits to simulate target instance sizes ─────────────────

  postgres:
    deploy:
      resources:
        limits:
          cpus: '${BENCH_DB_CPU:-0.5}'
          memory: ${BENCH_DB_MEM:-512m}

  backend:
    environment:
      PROVIDER_SIMULATOR_ENABLED: ${PROVIDER_SIMULATOR_ENABLED:-true}
      PROVIDER_SIMULATOR_BASE_LATENCY_MS: ${PROVIDER_SIMULATOR_BASE_LATENCY_MS:-25}
      PROVIDER_SIMULATOR_JITTER_MS: ${PROVIDER_SIMULATOR_JITTER_MS:-25}
      PROVIDER_SIMULATOR_FAILURE_RATE: ${PROVIDER_SIMULATOR_FAILURE_RATE:-0.0}
      PROVIDER_SIMULATOR_TIMEOUT_RATE: ${PROVIDER_SIMULATOR_TIMEOUT_RATE:-0.0}
      # Keep rate limiting out of the default benchmark signal. To benchmark
      # limiter behavior explicitly, override these values lower at runtime.
      REDIS_RATE_LIMIT_CREATE_PAYMENT_INTENT_PER_WINDOW: ${BENCH_REDIS_CREATE_LIMIT:-100000}
      REDIS_RATE_LIMIT_CONFIRM_PAYMENT_INTENT_PER_WINDOW: ${BENCH_REDIS_CONFIRM_LIMIT:-100000}
    deploy:
      resources:
        limits:
          cpus: '${BENCH_BACKEND_CPU:-1.0}'
          memory: ${BENCH_BACKEND_MEM:-1g}

  kafka:
    deploy:
      resources:
        limits:
          cpus: '${BENCH_KAFKA_CPU:-0.75}'
          memory: ${BENCH_KAFKA_MEM:-1g}

  redis:
    deploy:
      resources:
        limits:
          cpus: '${BENCH_REDIS_CPU:-0.25}'
          memory: ${BENCH_REDIS_MEM:-256m}

  dashboard:
    build:
      args:
        NEXT_PUBLIC_ENABLE_SIMULATOR_PROVIDER: ${NEXT_PUBLIC_ENABLE_SIMULATOR_PROVIDER:-true}
    deploy:
      resources:
        limits:
          cpus: '${BENCH_DASH_CPU:-0.25}'
          memory: ${BENCH_DASH_MEM:-256m}

  # ── Prometheus — enable remote-write receiver so k6 can push metrics in ─────
  # Override just the command; everything else (image, volumes, ports) comes from
  # docker-compose.yml.

  prometheus:
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver   # accepts k6 push during bench run
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  # ── Grafana — bumped to 512m; 256m is tight with live dashboard auto-refresh ──

  grafana:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512m

  # ── k6 load runner ──────────────────────────────────────────────────────────
  # Profile: bench — only starts when --profile bench is supplied.
  # Depends on the backend health check so k6 never fires before Spring Boot is ready.
  #
  # Metrics flow:
  #   k6 → Prometheus remote-write (port 9090) → Grafana bench dashboard (port 3001)
  #
  # Open http://localhost:3001 during the run to watch live panels.

  k6:
    image: grafana/k6:latest
    profiles: [bench]
    depends_on:
      backend:
        condition: service_healthy
      prometheus:
        condition: service_started
    volumes:
      - ./bench/k6:/scripts:ro
      - ./bench/results:/results
    environment:
      BASE_URL: ${BASE_URL:-http://backend:8080}
      RUN_MODE: ${RUN_MODE:-postgres_only}
      SIMULATOR_SUCCESS_RATE_PERCENT: ${SIMULATOR_SUCCESS_RATE_PERCENT:-100}
      # Push k6 metrics into Prometheus so the Grafana bench dashboard has live data.
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      # Export trend stats as plain Prometheus series such as k6_http_req_duration_p95.
      K6_PROMETHEUS_RW_TREND_STATS: p(50),p(95),p(99),avg,min,max
      # HTML report saved locally — open bench/results/report.html after the run
      K6_WEB_DASHBOARD: "true"
      K6_WEB_DASHBOARD_EXPORT: /results/report.html
    command: >
      run
      --out json=/results/results.json
      --out experimental-prometheus-rw
      /scripts/script.js
