global:
  scrape_interval:     15s   # how often to scrape targets
  evaluation_interval: 15s   # how often to evaluate alerting rules
  external_labels:
    environment: local

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: masonxpay-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend:8080
        labels:
          application: masonxpay
