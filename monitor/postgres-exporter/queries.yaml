# No custom queries needed.
# Table/index size metrics for payment_read_models are exposed by the gateway
# service itself via ReadModelMetrics (Micrometer gauges) at /actuator/prometheus:
#   payment_read_model_table_bytes
#   payment_read_model_index_bytes
#   payment_read_model_total_bytes
#
# Scan and row-count metrics are covered by the postgres-exporter built-in
# pg_stat_user_tables_* collector:
#   pg_stat_user_tables_seq_scan{datname="paygateway",relname="payment_read_models"}
#   pg_stat_user_tables_idx_scan{...}
#   pg_stat_user_tables_n_live_tup{...}
#   pg_stat_user_tables_n_dead_tup{...}
